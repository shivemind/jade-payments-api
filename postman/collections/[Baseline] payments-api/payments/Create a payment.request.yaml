      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "string",
            "amount": 5016.309993675854,
            "currency": "string",
            "status": "pending",
            "createdAt": "2004-02-14T04:48:00.818Z"
          }
      headers:
        - key: Content-Type
          value: application/json
        - key: traceparent
          value: ''
          disabled: false
    name: Created
