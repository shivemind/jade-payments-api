type: http
name: List payments
url: '{{baseUrl}}/payments'
method: GET
headers:
  - key: traceparent
    value: 00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01
    description: W3C Trace Context header for distributed tracing. Format `00-<32-hex-trace-id>-<16-hex-span-id>-01`.
  - key: Accept
    value: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          [
            {
              "id": "string",
              "amount": 4240.4523067491255,
              "currency": "string",
              "status": "pending",
              "createdAt": "1985-08-23T08:22:37.561Z"
            },
            {
              "id": "string",
              "amount": 8240.652072485456,
              "currency": "string",
              "status": "completed",
              "createdAt": "2020-09-22T05:51:10.676Z"
            }
          ]
      headers:
        - key: Content-Type
          value: application/json
        - key: traceparent
          value: ''
          disabled: false
    name: OK
