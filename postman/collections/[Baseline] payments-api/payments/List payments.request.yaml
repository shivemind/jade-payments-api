type: http
name: List payments
url: '{{baseUrl}}/payments'
method: GET
headers:
  - key: traceparent
    value: 00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01
    description: W3C Trace Context header for distributed tracing. Format `00-<32-hex-trace-id>-<16-hex-span-id>-01`.
  - key: Accept
    value: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          [
            {
              "id": "string",
              "amount": 6000.718383430372,
              "currency": "string",
              "status": "pending",
              "createdAt": "1990-03-18T16:53:03.185Z"
            },
            {
              "id": "string",
              "amount": 9073.414315158727,
              "currency": "string",
              "status": "failed",
              "createdAt": "1983-01-18T07:24:24.091Z"
            }
          ]
      headers:
        - key: Content-Type
          value: application/json
        - key: traceparent
          value: ''
          disabled: false
    name: OK
