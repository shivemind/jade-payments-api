type: http
name: List payments
url: '{{baseUrl}}/payments'
method: GET
headers:
  - key: traceparent
    value: 00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01
    description: W3C Trace Context header for distributed tracing. Format `00-<32-hex-trace-id>-<16-hex-span-id>-01`.
  - key: Accept
    value: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          [
            {
              "id": "string",
              "amount": 1458.8155747656972,
              "currency": "string",
              "status": "failed",
              "createdAt": "1970-01-06T14:42:26.730Z"
            },
            {
              "id": "string",
              "amount": 1465.1435078338304,
              "currency": "string",
              "status": "completed",
              "createdAt": "1972-03-21T09:51:37.239Z"
            }
          ]
      headers:
        - key: Content-Type
          value: application/json
        - key: traceparent
          value: ''
          disabled: false
    name: OK
