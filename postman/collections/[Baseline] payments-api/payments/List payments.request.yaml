type: http
name: List payments
url: '{{baseUrl}}/payments'
method: GET
headers:
  - key: traceparent
    value: 00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01
    description: W3C Trace Context header for distributed tracing. Format `00-<32-hex-trace-id>-<16-hex-span-id>-01`.
  - key: Accept
    value: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          [
            {
              "id": "string",
              "amount": 6424.974958371521,
              "currency": "string",
              "status": "completed",
              "createdAt": "1978-02-08T18:37:34.179Z"
            },
            {
              "id": "string",
              "amount": 6986.144163642687,
              "currency": "string",
              "status": "failed",
              "createdAt": "1966-01-03T03:35:42.505Z"
            }
          ]
      headers:
        - key: Content-Type
          value: application/json
        - key: traceparent
          value: ''
          disabled: false
    name: OK
